<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Vorreservierung</title>
    <style>
        /* --- ALLGEMEINES STYLING --- */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f9; padding: 20px 10px; margin: 0; color: #333; text-align: center; }
        
        .wrapper { max-width: 900px; margin: 20px auto 40px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        
        .status-badge { font-size: 14px; font-weight: 600; color: #dc3545; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
        h1 { font-size: 28px; margin-top: 0; margin-bottom: 10px; font-weight: 700; color: #222; }
        .sub-info { color: #666; margin-bottom: 15px; font-size: 15px; line-height: 1.5; padding: 0 15px; }
        
        /* Deadline Styling */
        .deadline-info { font-weight: bold; font-size: 16px; color: #dc3545; margin-bottom: 30px; display: block; }
        .deadline-bottom { font-weight: bold; font-size: 15px; color: #dc3545; margin-top: 25px; text-align: center; display: block; }

        /* --- FLEXBOX LAYOUT (Zentriert die Spalten am PC vertikal) --- */
        .content-layout { 
            display: flex; 
            flex-direction: column; 
            gap: 25px;
        }

        .column-left { 
            width: 100%; 
        }
        .column-right { 
            width: 100%; 
        }

        /* --- BILDERGALERIE (Ränder und Hintergrund entfernt) --- */
        .gallery-container { margin-bottom: 20px; }
        .main-img-box { 
            width: 100%; 
            max-width: 340px; 
            height: auto; 
            margin: 0 auto 15px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .main-img-box img { 
            width: 100%;
            height: auto;
            object-fit: contain; 
            cursor: zoom-in; 
            border-radius: 12px; 
        }
        
        .thumbnails { display: flex; justify-content: center; gap: 12px; }
        .thumb { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; background: #fafafa; -webkit-tap-highlight-color: transparent; transition: border-color 0.2s; }
        .thumb.active { border-color: #007bff; box-shadow: 0 2px 6px rgba(0,123,255,0.15); }

        /* --- GRÖSSENAUSWAHL & TOTAL-BADGE --- */
        .size-selection { margin-bottom: 25px; text-align: left; background: #fdfdfd; padding: 15px 20px; border-radius: 10px; border: 1px solid #f0f0f0; }
        
        .size-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid #f0f0f0; }
        .size-header-title { font-size: 13px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .total-badge { background-color: #e6f4ea; color: #137333; font-size: 13px; font-weight: bold; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; display: none; }

        .size-row { display: flex
